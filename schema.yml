components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        language:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - language
      - title
      - updated_at
    Contact:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        address:
          type: string
          nullable: true
          maxLength: 500
        phone:
          type: string
          nullable: true
          maxLength: 255
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/ContactAddress'
          readOnly: true
        phones:
          type: array
          items:
            $ref: '#/components/schemas/ContactPhone'
          readOnly: true
        emails:
          type: array
          items:
            $ref: '#/components/schemas/ContactEmail'
          readOnly: true
        working_hours:
          type: string
          nullable: true
          maxLength: 255
        map_url:
          type: string
          format: uri
          nullable: true
          maxLength: 1000
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - addresses
      - created_at
      - emails
      - id
      - phones
      - updated_at
    ContactAddress:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        address:
          type: string
          maxLength: 500
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address
      - created_at
      - id
      - updated_at
    ContactEmail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - updated_at
    ContactPhone:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - phone
      - updated_at
    Department:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        faculty:
          type: integer
        title:
          type: string
          maxLength: 255
        description:
          type: string
        head_name:
          type: string
          nullable: true
          maxLength: 255
        contact_info:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - faculty
      - id
      - title
      - updated_at
    Faculty:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        image:
          type: string
          format: uri
          nullable: true
        icon:
          type: string
          format: uri
          nullable: true
        departments:
          type: array
          items:
            $ref: '#/components/schemas/Department'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - departments
      - description
      - id
      - title
      - updated_at
    History:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        content:
          type: string
        image:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - title
      - updated_at
    LanguageOption:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
      required:
      - code
      - name
    LanguagesResponse:
      type: object
      properties:
        default_language:
          type: string
        languages:
          type: array
          items:
            $ref: '#/components/schemas/LanguageOption'
      required:
      - default_language
      - languages
    NewsDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
          nullable: true
        category_title:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        short_description:
          type: string
          readOnly: true
          nullable: true
        summary:
          type: string
          nullable: true
          maxLength: 500
        main_image:
          type: string
          format: uri
          nullable: true
        published_at:
          type: string
          format: date-time
        language:
          type: string
          readOnly: true
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
        content_paragraphs:
          type: array
          items:
            type: string
          readOnly: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/NewsImage'
          readOnly: true
        videos:
          type: array
          items:
            $ref: '#/components/schemas/NewsVideo'
          readOnly: true
      required:
      - category_title
      - content
      - content_paragraphs
      - created_at
      - id
      - images
      - language
      - short_description
      - slug
      - title
      - updated_at
      - videos
    NewsImage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
        caption:
          type: string
          nullable: true
          maxLength: 255
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - id
      - image
    NewsList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
          nullable: true
        category_title:
          type: string
          readOnly: true
        title:
